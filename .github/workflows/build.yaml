name: 🤖 Build Offline APK

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "Request identifier (for your tracking)"
        required: true
      app_name:
        description: "Android app name"
        required: true
        default: "My Offline App"
      application_id:
        description: "Application ID (e.g. com.example.offlineapp)"
        required: true
        default: "com.webview.myapplication"
      content_mode:
        description: "Local content mode"
        required: true
        type: choice
        default: "HTML"
        options: ["HTML", "PDF"]
      local_content_path:
        description: "Path inside app/src/main/assets (e.g. content/index.html or content/document.pdf)"
        required: true
        default: "content/index.html"
      view_mode:
        description: "Screen orientation mode"
        required: true
        type: choice
        default: "AUTO"
        options: ["AUTO", "PORTRAIT", "LANDSCAPE"]
      enable_javascript:
        description: "Enable JavaScript (HTML mode only)"
        required: true
        type: boolean
        default: false
      icon_url:
        description: "Optional icon URL (PNG/JPG)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate workflow inputs
        shell: bash
        run: |
          APP_NAME='${{ inputs.app_name }}'
          APPLICATION_ID='${{ inputs.application_id }}'
          CONTENT_MODE='${{ inputs.content_mode }}'
          LOCAL_CONTENT_PATH='${{ inputs.local_content_path }}'

          if ! perl -e "exit 1 unless q{$APP_NAME} =~ /^[:a-zA-Zא-ת0-9 _.-]{1,64}$/"; then
            echo "Error: invalid app_name"
            exit 1
          fi

          if ! perl -e "exit 1 unless q{$APPLICATION_ID} =~ /^[a-zA-Z][a-zA-Z0-9_]*(\.[a-zA-Z][a-zA-Z0-9_]*)+$/"; then
            echo "Error: invalid application_id"
            exit 1
          fi

          if [[ "$LOCAL_CONTENT_PATH" = /* ]] || [[ "$LOCAL_CONTENT_PATH" == *".."* ]]; then
            echo "Error: local_content_path must stay inside assets"
            exit 1
          fi

          if [[ "$CONTENT_MODE" == "HTML" && "$LOCAL_CONTENT_PATH" != *.html ]]; then
            echo "Error: HTML mode expects .html file"
            exit 1
          fi

          if [[ "$CONTENT_MODE" == "PDF" && "$LOCAL_CONTENT_PATH" != *.pdf ]]; then
            echo "Error: PDF mode expects .pdf file"
            exit 1
          fi

          if [[ ! -f "app/src/main/assets/$LOCAL_CONTENT_PATH" ]]; then
            echo "Error: missing asset file app/src/main/assets/$LOCAL_CONTENT_PATH"
            exit 1
          fi

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate app icons (optional)
        shell: bash
        run: |
          if [[ -n "${{ inputs.icon_url }}" ]]; then
            npm install
            node create_mipmap_images.js "${{ inputs.icon_url }}"
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        uses: timheuer/base64-to-file@v1.2.4
        with:
          fileName: android_keystore.jks
          fileDir: ${{ github.workspace }}/app/keystore/
          encodedString: ${{ secrets.KEYSTORE }}

      - name: Build release APK
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          APPLICATION_ID: ${{ inputs.application_id }}
          APP_NAME: ${{ inputs.app_name }}
          CONTENT_MODE: ${{ inputs.content_mode }}
          LOCAL_CONTENT_PATH: ${{ inputs.local_content_path }}
          VIEW_MODE: ${{ inputs.view_mode }}
          ENABLE_JAVASCRIPT: ${{ inputs.enable_javascript }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        shell: bash
        run: |
          SAFE_NAME=$(echo '${{ inputs.app_name }}' | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9._-' '-')
          APK_NAME="offline-${SAFE_NAME}-${{ github.run_id }}.apk"
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/${APK_NAME}"
          echo "APK_NAME=${APK_NAME}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: app/build/outputs/apk/release/${{ env.APK_NAME }}

      - name: Create prerelease with APK
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: offline-v${{ github.run_id }}
          name: Offline APK v${{ github.run_id }} (${{ inputs.app_name }})
          prerelease: true
          draft: false
          files: app/build/outputs/apk/release/${{ env.APK_NAME }}
          body: |
            Offline single-file viewer build.

            Request ID: ${{ inputs.request_id }}
            App Name: ${{ inputs.app_name }}
            Application ID: ${{ inputs.application_id }}
            Content Mode: ${{ inputs.content_mode }}
            Local Content Path: ${{ inputs.local_content_path }}
            View Mode: ${{ inputs.view_mode }}
            Enable JavaScript: ${{ inputs.enable_javascript }}

      - name: Print release URL
        run: |
          echo "Release URL: ${{ steps.create_release.outputs.url }}"
